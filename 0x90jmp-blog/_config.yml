theme: jekyll-theme-chirpy

lang: en
timezone: UTC

# -------------------------------------------------------
# Site Info
# -------------------------------------------------------
title: "0x90JMP"
tagline: "Malware Dev · EDR Bypass · Red Team Ops"
description: >-
  Offensive security research covering malware development, AV/EDR evasion,
  Active Directory attack chains, and red team tradecraft.

url: "https://0x90jmp.github.io"
baseurl: ""

github:
  username: 0x90JMP

# Twitter/X handle (optional)
twitter:
  username: ""

social:
  name: "0x90JMP"
  email: ""
  links:
    - https://github.com/0x90JMP

# -------------------------------------------------------
# Appearance
# -------------------------------------------------------
theme_mode: dark  # light | dark | (leave blank to allow toggle)

avatar: ""  # path to /assets/img/avatar.png if you add one

toc: true  # table of contents on posts by default

# -------------------------------------------------------
# Comments — pick ONE or leave all blank to disable
# -------------------------------------------------------
comments:
  active: ""  # utterances | giscus | disqus

utterances:
  repo: ""
  issue_term: "pathname"

giscus:
  repo: ""
  repo_id: ""
  category: ""
  category_id: ""
  mapping: "pathname"
  input_position: "bottom"
  lang: "en"
  reactions_enabled: "1"

disqus:
  shortname: ""

# -------------------------------------------------------
# Analytics
# -------------------------------------------------------
google_analytics:
  id: ""

# -------------------------------------------------------
# SEO / Feed
# -------------------------------------------------------
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-archives

# -------------------------------------------------------
# Pagination
# -------------------------------------------------------
paginate: 10

# -------------------------------------------------------
# Jekyll Build Settings
# -------------------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: /posts/:title/

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# -------------------------------------------------------
# Collections (required by Chirpy for tabs)
# -------------------------------------------------------
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false   # set to true once comments provider is configured
      toc: true
      math: false
      mermaid: false
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# -------------------------------------------------------
# Archives (categories + tags pages)
# -------------------------------------------------------
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# -------------------------------------------------------
# Assets / PWA
# -------------------------------------------------------
assets:
  self_host:
    enabled: false

pwa:
  enabled: true
  cache:
    enabled: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
